#
# Casino System — virtual host
# arusha.local / dodoma.local / mbeya.local / mwanza.local
# Имя хоста подставляется через ${LOCAL_DOMAIN} при первом запуске install.sh
#

# HTTP → HTTPS редирект
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# Главный HTTPS сервер
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Security headers (адекватно для PWA в LAN)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=()" always;

    root /usr/share/nginx/html;
    index index.html;

    # ──────────────────────────────────────────────────
    # API прокси: /api/* → PostgREST/GoTrue/Storage/Realtime
    # Эмулирует структуру Supabase URL (rest/v1, auth/v1, etc.)
    # ──────────────────────────────────────────────────

    # PostgREST (data API)
    location /api/rest/v1/ {
        proxy_pass http://postgrest:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_pass_request_headers on;
    }

    # GoTrue (auth)
    location /api/auth/v1/ {
        proxy_pass http://gotrue:9999/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Storage (фото, документы)
    location /api/storage/v1/ {
        proxy_pass http://storage:5000/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_request_buffering off;
    }

    # Realtime (WebSocket)
    location /api/realtime/v1/ {
        proxy_pass http://realtime:4000/socket/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Node admin routes (super_admin only — JWT verified inside cms-sync)
    location /api/node/ {
        proxy_pass http://cms-sync:8787/node/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type $http_content_type;
        proxy_read_timeout 60s;
    }

    # Peer-to-peer mesh endpoints (HMAC-authenticated, no JWT)
    # Reachable as https://<this-node>/peer/{handshake,push,pull,health}
    location /peer/ {
        proxy_pass http://cms-sync:8787/peer/;
        proxy_set_header Host $host;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header X-Peer-Node-Id $http_x_peer_node_id;
        proxy_set_header X-Peer-Signature $http_x_peer_signature;
        proxy_read_timeout 60s;
    }

    # ──────────────────────────────────────────────────
    # PWA фронтенд (статика)
    # ──────────────────────────────────────────────────

    # Service Worker и manifest — НЕ кешировать
    location = /sw.js                  { add_header Cache-Control "no-cache, no-store, must-revalidate"; try_files $uri =404; }
    location = /service-worker.js      { add_header Cache-Control "no-cache, no-store, must-revalidate"; try_files $uri =404; }
    location = /manifest.json          { add_header Cache-Control "no-cache, no-store, must-revalidate"; try_files $uri =404; }
    location = /manifest.webmanifest   { add_header Cache-Control "no-cache, no-store, must-revalidate"; try_files $uri =404; }
    location ~ ^/manifest-.*\.json$    { add_header Cache-Control "no-cache, no-store, must-revalidate"; try_files $uri =404; }

    # Хеш-чанки можно кешировать долго (имя меняется при каждом билде)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Healthcheck
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
