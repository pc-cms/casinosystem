    <link rel="icon" href="/favicon.png" type="image/png" />

    <link id="app-manifest" rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1a2e" />
    <script>
      // Swap PWA manifest based on the route so each module installs as its own app.
      (function () {
        try {
          var path = window.location.pathname || "";
          var manifest = "/manifest.json"; // default = Reception
          if (path.indexOf("/pit") === 0) manifest = "/manifest-pit.json";
          var link = document.getElementById("app-manifest");
          if (link && link.getAttribute("href") !== manifest) {
            link.setAttribute("href", manifest);
          }
        } catch (e) { /* noop */ }
      })();
    </script>
