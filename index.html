<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Casino System — Management Platform</title>
    <meta name="description" content="Casino Management System for cashier, pit, and manager operations. Real-time tracking, transactions, and reporting.">
    <meta name="author" content="Casino System" />

    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link id="app-manifest" rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Casino System" />
    <script>
      // Per-subdomain branding for browser tab + manifest + apple-touch-icon.
      // CRITICAL: iOS/Android pin the manifest at install time. We MUST set the
      // <link rel="manifest"> to a real static URL BEFORE any service worker
      // registration so that the installer reads the correct branded manifest.
      (function () {
        try {
          var host = (window.location.hostname || "").toLowerCase();
          var label = host.split(".")[0];

          // On-prem subdomains alias to canonical casino branding.
          var ALIAS = { mwz: "mwanza", aru: "arusha", dod: "dodoma", mbi: "mbeya" };
          var canonical = ALIAS[label] || label;
          var isOnPrem = ALIAS.hasOwnProperty(label);

          var BRANCHES = {
            arusha:  { name: "Premier Arusha",  manifest: "/manifest-arusha.json"  },
            mwanza:  { name: "Premier Mwanza",  manifest: "/manifest-mwanza.json"  },
            dodoma:  { name: "Premier Dodoma",  manifest: "/manifest-dodoma.json"  },
            mbeya:   { name: "Premier Mbeya",   manifest: "/manifest-mbeya.json"   },
            premier: { name: "Premier HQ",      manifest: "/manifest-premier.json" },
            club:    { name: "Premier Club",    manifest: "/manifest-club.json", themeColor: "#A0000D", favicon: "/favicon-club.png" },
          };
          // On-prem variants get their own pinnable manifest so installed PWA stays distinct.
          var ONPREM_MANIFEST = { mwz: "/manifest-mwz.json", aru: "/manifest-aru.json", dod: "/manifest-dod.json", mbi: "/manifest-mbi.json" };

          var branch = BRANCHES[canonical] || null;

          if (branch) {
            var displayName = isOnPrem ? (branch.name + " (Local)") : branch.name;

            // Pick branded icons (apple-touch-icon must be a real square PNG with solid background;
            // iOS overlays transparent icons on black, which we want to avoid).
            var faviconHref = branch.favicon || "/favicon.png";
            var appleHref   = branch.appleTouchIcon || branch.favicon || "/apple-touch-icon.png";
            if (canonical === "arusha") { faviconHref = "/arusha-logo.png"; appleHref = "/arusha-logo.png"; }

            // CRITICAL for iOS "Add to Home Screen":
            // iOS reads <title>, <meta name="apple-mobile-web-app-title"> and
            // <link rel="apple-touch-icon"> from the parsed HTML and frequently
            // IGNORES attribute mutations via setAttribute. To make branding
            // stick we REMOVE the static tags and APPEND fresh nodes.
            function replaceTag(selector, build) {
              var old = document.head.querySelector(selector);
              if (old) old.parentNode.removeChild(old);
              var fresh = build();
              document.head.appendChild(fresh);
              return fresh;
            }

            replaceTag('title', function () {
              var t = document.createElement('title'); t.textContent = displayName; return t;
            });
            replaceTag('meta[name="apple-mobile-web-app-title"]', function () {
              var m = document.createElement('meta');
              m.setAttribute('name', 'apple-mobile-web-app-title');
              m.setAttribute('content', displayName);
              return m;
            });
            replaceTag('link[rel="apple-touch-icon"]', function () {
              var l = document.createElement('link');
              l.setAttribute('rel', 'apple-touch-icon');
              l.setAttribute('sizes', '180x180');
              l.setAttribute('href', appleHref);
              return l;
            });
            replaceTag('link[rel="icon"]', function () {
              var l = document.createElement('link');
              l.setAttribute('rel', 'icon');
              l.setAttribute('type', 'image/png');
              l.setAttribute('href', faviconHref);
              return l;
            });

            var link = document.getElementById("app-manifest");
            if (link) link.setAttribute("href", isOnPrem ? ONPREM_MANIFEST[label] : branch.manifest);

            if (branch.themeColor) {
              var tc = document.querySelector('meta[name="theme-color"]');
              if (tc) tc.setAttribute("content", branch.themeColor);
            }
            if (canonical === "club") {
              var desc = document.querySelector('meta[name="description"]');
              if (desc) desc.setAttribute("content", "Premier Club — premium gaming rewards, wallet & exclusive perks in Tanzania.");
              var ogt = document.querySelector('meta[property="og:title"]');
              if (ogt) ogt.setAttribute("content", "Premier Club");
              var ogd = document.querySelector('meta[property="og:description"]');
              if (ogd) ogd.setAttribute("content", "Premium gaming rewards, wallet & exclusive perks in Tanzania.");
            }
          }
        } catch (e) { /* noop */ }
      })();
    </script>
