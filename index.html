<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Casino System — Management Platform</title>
    <meta name="description" content="Casino Management System for cashier, pit, and manager operations. Real-time tracking, transactions, and reporting.">
    <meta name="author" content="Casino System" />

    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon-192-any.png" />
    <link id="app-manifest" rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Casino System" />
    <script>
      // Single PWA for the whole Casino System.
      // Name is dynamically branded per subdomain (arusha → "Casino System — Premier Arusha", etc.).
      // Note: PWA name is pinned at install time on iOS/Android — branding only affects fresh installs.
      (function () {
        try {
          var host = (window.location.hostname || "").toLowerCase();

          // Map known branch subdomains → branded names.
          var BRANCH_NAMES = {
            arusha: "Premier Arusha",
            mwanza: "Premier Mwanza",
            dodoma: "Premier Dodoma",
            mbeya:  "Premier Mbeya",
            premier: "Premier HQ",
          };

          // Extract leftmost subdomain label (works for arusha.casinosystem.app
          // and arusha.casinosystem.lovable.app and arusha.localhost).
          var label = host.split(".")[0];
          var branchSuffix = BRANCH_NAMES[label] || null;

          var fullName = branchSuffix
            ? "Casino System — " + branchSuffix
            : "Casino System";
          var shortName = branchSuffix ? branchSuffix : "Casino System";

          // Build a dynamic manifest by patching the static one.
          fetch("/manifest.json", { cache: "no-cache" })
            .then(function (r) { return r.json(); })
            .then(function (m) {
              m.name = fullName;
              m.short_name = shortName;
              var blob = new Blob([JSON.stringify(m)], { type: "application/manifest+json" });
              var url = URL.createObjectURL(blob);
              var link = document.getElementById("app-manifest");
              if (link) link.setAttribute("href", url);
            })
            .catch(function () { /* keep static manifest as fallback */ });

          // Brand swap (favicon + apple-touch-icon) for arusha.*
          if (/^arusha\./i.test(host)) {
            var fav = document.querySelector('link[rel="icon"]');
            if (fav) fav.setAttribute("href", "/arusha-logo.png");
            var apple = document.querySelector('link[rel="apple-touch-icon"]');
            if (apple) apple.setAttribute("href", "/arusha-logo.png");
          }
        } catch (e) { /* noop */ }
      })();
    </script>
