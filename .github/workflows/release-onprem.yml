name: Build & Release Frontend Docker Image

# Собирает Docker-образ cms-frontend и публикует его в GitHub Container Registry.
# Локальные серверы казино (через cms-updater, этап D) подтягивают этот образ
# раз в час и обновляются без даунтайма.
#
# Триггеры:
#   - push в main → собирает :latest + :main-<short-sha>
#   - tag v*.*.*  → собирает :vX.Y.Z + :latest + создаёт GitHub Release
#
# Требования:
#   - Repository → Settings → Actions → General → Workflow permissions = Read and write
#   - Settings → Actions → General → Allow GitHub Actions to create and approve PRs

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Версия (например 1.2.3) — без префикса v"
        required: true
        default: "0.1.0"

permissions:
  contents: write    # для GitHub Release
  packages: write    # для ghcr.io
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cms-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      digest:  ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW="${{ inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            RAW="${GITHUB_REF#refs/tags/}"
          else
            RAW="0.0.0-main.${GITHUB_SHA::7}"
          fi
          # Strip optional leading "v" or "v." (handles v1.2.3 and accidental v.1.2.3).
          VERSION="${RAW#v}"
          VERSION="${VERSION#.}"
          # Validate: must start with a digit (Docker tag rules forbid leading "." or "-").
          if [[ ! "$VERSION" =~ ^[0-9] ]]; then
            echo "::error::Invalid version derived from ref '${RAW}': '${VERSION}'"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          REPO_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          TAGS="${{ env.REGISTRY }}/${REPO_LC}:${{ steps.meta.outputs.version }}"
          if [[ "${{ github.ref }}" == refs/tags/v* || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${REPO_LC}:latest"
          fi
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${REPO_LC}:main"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Tags: ${TAGS}"

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.frontend
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VITE_BUILD_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Export migrations bundle
        run: |
          mkdir -p release
          tar -czf release/migrations-${{ steps.meta.outputs.version }}.tar.gz \
            -C supabase migrations
          (cd release && sha256sum migrations-${{ steps.meta.outputs.version }}.tar.gz > migrations-${{ steps.meta.outputs.version }}.tar.gz.sha256)

      - name: Upload migrations artifact
        uses: actions/upload-artifact@v4
        with:
          name: migrations-${{ steps.meta.outputs.version }}
          path: release/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download migrations
        uses: actions/download-artifact@v4
        with:
          name: migrations-${{ needs.build.outputs.version }}
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Release v${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: |
            release/*
          body: |
            ## Casino System — v${{ needs.build.outputs.version }}

            ### Docker image
            ```
            ghcr.io/${{ github.repository_owner }}/cms-frontend:${{ needs.build.outputs.version }}
            ```
            Digest: `${{ needs.build.outputs.digest }}`

            ### Установка обновления на локальный сервер
            ```bash
            cd /opt/casino-system
            sed -i "s/^FRONTEND_VERSION=.*/FRONTEND_VERSION=${{ needs.build.outputs.version }}/" .env
            docker compose pull cms-frontend
            docker compose up -d --no-deps cms-frontend
            ```
            (или подождите час — `cms-updater` подтянет автоматически после Этапа D)

            ### Откат
            ```bash
            sed -i "s/^FRONTEND_VERSION=.*/FRONTEND_VERSION=PREV_VERSION/" .env
            docker compose up -d --no-deps cms-frontend
            ```
